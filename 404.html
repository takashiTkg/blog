<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ページが移転しました</title>
  <script>
    // /blog/posts/foo/ → https://blog.takashi-tkg.com/posts/foo/
    const newUrl = "https://blog.takashi-tkg.com" + window.location.pathname.replace('/blog', '');
    window.location.href = newUrl;
  </script>
</head>
<body>
  <p>ブログは新しいドメインに移転しました。自動的にリダイレクトされない場合は、<a href="https://blog.takashi-tkg.com/">こちら</a>をクリックしてください。</p>
</body>
</html>
